plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services" // Required for Firebase
}

android {
    namespace = "com.trackiq.messiq"
    compileSdk = 34 // FIXED: Bumped to 34 to satisfy share_plus and modern packages
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId = "com.trackiq.messiq"
        minSdk = 23 // Minimum required for modern Firebase and Flutter
        targetSdk = 34 // FIXED: Bumped to 34 to match compileSdk
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Flutter dependencies are handled automatically by the Flutter Gradle Plugin.
}

// NEW: The Master Override! 
// This intercepts every hidden plugin (like share_plus) and forces them to compile at API 34
gradle.projectsEvaluated {
    rootProject.subprojects { project ->
        if (project.hasProperty('android')) {
            project.android {
                compileSdkVersion = 34
            }
        }
    }
}
