name: Build MessIQ APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Delete Corrupted Android Folder
      run: rm -rf android

    - name: Regenerate Pristine Android Folder
      run: flutter create --platforms=android --org com.trackiq .

    # 🎨 NEW: This instantly fixes the lowercase name issue!
    - name: Rename App Label
      run: sed -i 's/android:label="messiq"/android:label="MessIQ"/g' android/app/src/main/AndroidManifest.xml

    - name: Get Dependencies
      run: flutter pub get

    - name: Generate App Icons
      run: flutter pub run flutter_launcher_icons

    - name: Build MessIQ APK
      run: flutter build apk --debug

    - name: Rename APK for Professional Distribution
      run: mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/MessIQ-v1.0-Debug.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MessIQ-Debug-Build
        path: build/app/outputs/flutter-apk/MessIQ-v1.0-Debug.apk
