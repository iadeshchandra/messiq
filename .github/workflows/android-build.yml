name: Build MessIQ APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    # 🚨 THE ULTIMATE RESET 🚨
    - name: Delete Corrupted Android Folder
      run: rm -rf android

    - name: Regenerate Pristine Android Folder
      run: flutter create --platforms=android --org com.trackiq .
    # -------------------------

    - name: Get Dependencies
      run: flutter pub get

    # 🎨 NEW: GENERATE THE APP ICON ON THE SERVER
    # This runs right after the Android folder is created so the icons are fresh!
    - name: Generate App Icons
      run: flutter pub run flutter_launcher_icons

    - name: Build MessIQ APK
      run: flutter build apk --debug

    - name: Rename APK for Professional Distribution
      run: mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/MessIQ-v1.0-Debug.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MessIQ-Debug-Build
        path: build/app/outputs/flutter-apk/MessIQ-v1.0-Debug.apk
