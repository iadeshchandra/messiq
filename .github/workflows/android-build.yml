name: Build MessIQ APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Setup Gradle 8.7
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'
        cache-disabled: true

    - name: Clean up Windows Hidden Files
      run: find . -name "desktop.ini" -type f -delete

    - name: Decode and create google-services.json
      env:
        FIREBASE_SECRET: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        mkdir -p android/app
        echo "$FIREBASE_SECRET" > android/app/google-services.json

    # 🛠 THE NUCLEAR FIX: Force modern v2 embedding right before build
    - name: Force Modern Android Setup
      run: |
        # 1. Purge any old java files causing the v1 error
        rm -rf android/app/src/main/java
        
        # 2. Recreate the proper Kotlin directory
        mkdir -p android/app/src/main/kotlin/com/trackiq/messiq
        
        # 3. Force-write the modern Kotlin file
        cat << 'EOF' > android/app/src/main/kotlin/com/trackiq/messiq/MainActivity.kt
        package com.trackiq.messiq
        import io.flutter.embedding.android.FlutterActivity
        class MainActivity: FlutterActivity() {
        }
        EOF
        
        # 4. Force-write the modern v2 Manifest file
        cat << 'EOF' > android/app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.trackiq.messiq">
            <application
                android:label="MessIQ"
                android:name="${applicationName}"
                android:icon="@mipmap/ic_launcher">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTop"
                    android:theme="@style/LaunchTheme"
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                    android:hardwareAccelerated="true"
                    android:windowSoftInputMode="adjustResize">
                    <meta-data
                      android:name="io.flutter.embedding.android.NormalTheme"
                      android:resource="@style/NormalTheme"
                      />
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
                <meta-data
                    android:name="flutterEmbedding"
                    android:value="2" />
            </application>
        </manifest>
        EOF

    - name: Get Dependencies
      run: flutter pub get

    - name: Build MessIQ APK
      run: flutter build apk --debug

    - name: Rename APK for Professional Distribution
      run: mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/MessIQ-v1.0-Debug.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MessIQ-Debug-Build
        path: build/app/outputs/flutter-apk/MessIQ-v1.0-Debug.apk
