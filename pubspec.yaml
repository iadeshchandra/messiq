name: messiq
description: Smart Living OS for Shared Life
publish_to: 'none'
version: 1.0.0+2 # FIXED: Bumped to force GitHub to do a deep clean

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # FIXED: Upgraded to squash the Pigeon UserDetails casting bug
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.13.6
  firebase_messaging: ^14.7.10

  flutter_riverpod: ^2.4.9
  google_fonts: ^6.1.0
  mobile_scanner: ^4.0.0
  pdf: ^3.10.8
  path_provider: ^2.1.2
  share_plus: ^7.2.1

  qr_flutter: ^4.1.0

  # NEW: Camera and Google ML Kit AI dependencies
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false # FIXED: Set to false so the iOS folder missing error is bypassed
  image_path: "assets/app_logo.png"
  adaptive_icon_background: "#FFFFFF" # FIXED: Changed to solid white
  adaptive_icon_foreground: "assets/app_logo.png"
